<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Restablecer contraseña — TechDesk Pro">
  <title>Restablecer Contraseña — TechDesk Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .bg-animated {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(6,182,212,0.15) 0%, transparent 50%),
                  var(--bg-primary);
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 6s ease-in-out infinite; z-index: 0; }
    .orb-1 { width: 400px; height: 400px; background: rgba(99,102,241,0.3); top: -100px; left: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(6,182,212,0.3); bottom: -50px; right: -50px; animation-delay: 3s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    .reset-card {
      position: relative; z-index: 10;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%; max-width: 440px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .card-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 18px; margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }

    .card-title { text-align: center; margin-bottom: 8px; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .card-subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .input-wrapper { position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; pointer-events: none; }
    .form-input {
      width: 100%; padding: 12px 42px 12px 42px;
      background: var(--bg-tertiary); border: 1.5px solid var(--border-color);
      border-radius: 10px; color: var(--text-primary);
      font-size: 0.9rem; font-family: 'Inter', sans-serif;
      transition: all 0.2s; outline: none; box-sizing: border-box;
    }
    .form-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .input-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; font-size: 16px; transition: color 0.2s; }
    .input-toggle:hover { color: var(--text-secondary); }

    .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent-primary), #7c3aed);
      color: #fff; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: all 0.3s ease; margin-top: 8px;
      position: relative; overflow: hidden;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.4); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .btn-submit .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert { padding: 12px 16px; border-radius: 10px; font-size: 0.875rem; margin-bottom: 20px; display: none; align-items: center; gap: 10px; }
    .alert.show { display: flex; }
    .alert-error   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

    .strength-bar { height: 4px; border-radius: 2px; background: var(--border-color); margin-top: 8px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }

    .password-hints { font-size: 0.78rem; color: var(--text-muted); margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; }
    .hint { display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
    .hint.ok { color: #4ade80; }
    .hint.ok i { color: #4ade80; }

    .back-link { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 24px; font-size: 0.875rem; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--text-primary); }

    .error-state { text-align: center; }
    .error-state .error-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .error-state h3 { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .error-state p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
    .btn-back {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px;
      background: var(--bg-tertiary); border: 1px solid var(--border-color);
      color: var(--text-secondary); font-size: 0.9rem; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-back:hover { border-color: var(--accent-primary); color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="bg-animated"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="reset-card">
    <div class="card-icon">🔑</div>

    <!-- Estado: token inválido/ausente -->
    <div id="state-invalid" style="display:none;" class="error-state">
      <div class="error-icon">⚠️</div>
      <h3>Enlace inválido o expirado</h3>
      <p>El enlace de recuperación no es válido o ha expirado.<br>Los enlaces de recuperación son válidos por <strong>1 hora</strong>.</p>
      <a href="/login" class="btn-back">
        <i class="fas fa-arrow-left"></i> Volver al Login
      </a>
    </div>

    <!-- Estado: formulario de reset -->
    <div id="state-form">
      <h1 class="card-title">Nueva Contraseña</h1>
      <p class="card-subtitle">Ingresa y confirma tu nueva contraseña de acceso</p>

      <div id="alert-box" class="alert alert-error" role="alert">
        <i class="fas fa-circle-exclamation"></i>
        <span id="alert-msg"></span>
      </div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="new-password">Nueva contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="new-password" class="form-input" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
            <button type="button" class="input-toggle" id="toggle-pw1" aria-label="Mostrar contraseña">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="password-hints">
            <span class="hint" id="hint-len"><i class="fas fa-circle-dot"></i> 8+ caracteres</span>
            <span class="hint" id="hint-upper"><i class="fas fa-circle-dot"></i> Mayúscula</span>
            <span class="hint" id="hint-num"><i class="fas fa-circle-dot"></i> Número</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar contraseña</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirm-password" class="form-input" placeholder="Repite la contraseña" autocomplete="new-password" required>
            <button type="button" class="input-toggle" id="toggle-pw2" aria-label="Mostrar contraseña">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <span class="btn-text">Cambiar Contraseña</span>
          <div class="spinner"></div>
        </button>
      </form>

      <a href="/login" class="back-link">
        <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
      </a>
    </div>
  </div>

  <script>
    // ── Token desde URL ──────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('state-form').style.display    = 'none';
      document.getElementById('state-invalid').style.display = 'block';
    }

    // ── Toggle visibilidad ───────────────────────────────────────
    function makeToggle(btnId, inputId) {
      document.getElementById(btnId).addEventListener('click', function() {
        const inp  = document.getElementById(inputId);
        const icon = this.querySelector('i');
        if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
        else                         { inp.type = 'password'; icon.className = 'fas fa-eye'; }
      });
    }
    makeToggle('toggle-pw1', 'new-password');
    makeToggle('toggle-pw2', 'confirm-password');

    // ── Indicador de fuerza de contraseña ───────────────────────
    document.getElementById('new-password').addEventListener('input', function() {
      const val   = this.value;
      const len   = val.length >= 8;
      const upper = /[A-Z]/.test(val);
      const num   = /[0-9]/.test(val);

      document.getElementById('hint-len').className   = 'hint' + (len   ? ' ok' : '');
      document.getElementById('hint-upper').className = 'hint' + (upper ? ' ok' : '');
      document.getElementById('hint-num').className   = 'hint' + (num   ? ' ok' : '');

      const score   = [len, upper, num].filter(Boolean).length;
      const fill    = document.getElementById('strength-fill');
      const colors  = ['', '#ef4444', '#eab308', '#22c55e'];
      const widths  = ['0%', '33%', '66%', '100%'];
      fill.style.width      = widths[score];
      fill.style.background = colors[score];
    });

    // ── Alerta ───────────────────────────────────────────────────
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.className = `alert alert-${type} show`;
      document.getElementById('alert-msg').textContent = msg;
    }

    // ── Submit del formulario ────────────────────────────────────
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password        = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const btn             = document.getElementById('btn-submit');

      if (!password || !confirmPassword) {
        showAlert('Por favor completa todos los campos.');
        return;
      }
      if (password.length < 8) {
        showAlert('La contraseña debe tener al menos 8 caracteres.');
        return;
      }
      if (password !== confirmPassword) {
        showAlert('Las contraseñas no coinciden. Verifica e intenta de nuevo.');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password, confirmPassword })
        });
        const data = await res.json();

        if (!res.ok) {
          if (res.status === 400 && data.error?.includes('Token')) {
            document.getElementById('state-form').style.display    = 'none';
            document.getElementById('state-invalid').style.display = 'block';
          } else {
            showAlert(data.error || 'Error al restablecer la contraseña.');
          }
        } else {
          showAlert('¡Contraseña actualizada correctamente! Redirigiendo...', 'success');
          setTimeout(() => { window.location.href = '/login?reset=success'; }, 1500);
        }
      } catch {
        showAlert('Error de conexión. Verifica tu red e intenta de nuevo.');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
