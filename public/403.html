<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Acceso Denegado — TechDesk Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-container { text-align: center; max-width: 480px; padding: 40px; }
    .error-code { font-size: 8rem; font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .error-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin: 16px 0 8px; }
    .error-desc { color: var(--text-muted); margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">403</div>
    <div class="error-title"> Acceso Denegado</div>
    <p class="error-desc">No tienes permisos para acceder a esta sección. Contacta al administrador si crees que es un error.</p>
    <a href="/dashboard" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Volver al Dashboard</a>
  </div>
</body>
</html>
